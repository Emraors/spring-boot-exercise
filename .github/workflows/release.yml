name: Release

on:
  push:
    tags:
      - 'v*.*.*'          # e.g. v1.0.0, v1.2.3-RC1

# Only one release at a time
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 – Re-run full verify on the tagged commit (same gates as CI)
  # ───────────────────────────────────────────────────────────────────────────
  verify:
    name: Full Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin) with Maven cache
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run all tests (unit + slice + integration)
        run: |
          mvn verify \
            --no-transfer-progress \
            -pl payment-app -am

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 – Build Docker image and push to GitHub Container Registry (ghcr.io)
  # ───────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write     # required to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin) with Maven cache
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build fat jar
        run: |
          mvn package \
            --no-transfer-progress \
            -DskipTests \
            -pl payment-app -am

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 – Create GitHub Release and attach the fat jar
  # ───────────────────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write     # required to create a GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin) with Maven cache
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build fat jar
        run: |
          mvn package \
            --no-transfer-progress \
            -DskipTests \
            -pl payment-app -am

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: payment-app/target/payment-app-*.jar
          generate_release_notes: true

