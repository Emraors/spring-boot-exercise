# ============================================================
# Profile: test  (integration tests)
# Activated by @ActiveProfiles("test") in PaymentIntegrationTest.
#
# spring.datasource.*  and  payment.provider.base-url  are
# injected at runtime by @DynamicPropertySource (Testcontainers
# for Postgres, WireMock for the provider URL).
# ============================================================

spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: simple

logging:
  level:
    org.example.payment: DEBUG

