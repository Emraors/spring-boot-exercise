spring:
  application:
    name: payment-app

  # Active profile defaults to 'dev' when none is specified externally.
  # Override via: --spring.profiles.active=prod  or  SPRING_PROFILES_ACTIVE=prod
  profiles:
    active: dev

  # --- shared defaults (all profiles inherit these) ---
  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: simple


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

server:
  port: 8080
